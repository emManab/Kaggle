name: Sync Kaggle Notebooks

on:
  schedule:
    - cron: '0 0 * * *'   # runs daily
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install Kaggle API
      run: pip install kaggle

    - name: Setup Kaggle API
      run: |
        mkdir -p ~/.kaggle
        echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json

    - name: Download notebooks
      run: |
        mkdir notebooks
        kaggle kernels list -u ${{ secrets.KAGGLE_USERNAME }} --output kernels.csv
        tail -n +2 kernels.csv | cut -d',' -f1 | while read ref; do
          kaggle kernels pull $ref -p notebooks/
        done

    - name: Commit & push
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Auto-sync Kaggle notebooks" || echo "No changes"
        git push
